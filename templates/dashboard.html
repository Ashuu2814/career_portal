{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>
            Welcome, {{ user.username }}
        </h2>

        <p class="mt-3">
            This is your dashboard.
        </p>

        <hr>

        <h4>User Information</h4>

        <ul>
            <li>Username: {{ user.username }}</li>
            <li>Email: {{ user.email }}</li>
            <li>Date Joined: {{ user.date_joined }}</li>
        </ul>

    </div>

</div>

{% endblock %}
