{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career Portal</title>


<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>


<body>


<nav class="navbar">

<div class="nav-container">


<a class="logo" href="/">
    Career Portal
</a>


<div class="nav-links">


{% if user.is_authenticated %}


<span class="username">
Hello, {{ user.username }}
</span>


<a href="/dashboard/">
Dashboard
</a>


<a href="/profile/">
Profile
</a>


<a class="logout" href="/logout/">
Logout
</a>



{% else %}


<a href="/login/">
Login
</a>


<a class="signup" href="/signup/">
Signup
</a>


{% endif %}


</div>


</div>

</nav>



<div class="main-container">


{% block content %}

{% endblock %}


</div>



</body>

</html>
