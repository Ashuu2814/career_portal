<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Career Portal
    </title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>


<body>


<nav class="navbar">

    <div class="nav-container">


        <a href="/" class="logo">
            Career Portal
        </a>



        <div class="nav-links">


            {% if user.is_authenticated %}


                <span class="username">
                    Hello, {{ user.username }}
                </span>


                <a href="/dashboard/">
                    Dashboard
                </a>


                <a href="/profile/">
                    Profile
                </a>


                <a href="/logout/">
                    Logout
                </a>



            {% else %}


                <a href="/login/">
                    Login
                </a>


                <a href="/signup/" class="signup-btn">
                    Signup
                </a>


            {% endif %}


        </div>


    </div>


</nav>



<div class="container">


    {% block content %}


    {% endblock %}


</div>



</body>

</html>
