{% extends 'base.html' %}

{% block content %}

<div class="jobs-container">

<h1>Available Jobs</h1>


{% for job in jobs %}

<div class="job-card">

    <h2>{{ job.title }}</h2>

    <h4>{{ job.company }}</h4>

    <p>
        {{ job.description }}
    </p>

    <button class="apply-btn">
        Apply Now
    </button>

</div>


{% endfor %}


</div>

{% endblock %}
